appId: com.chequeprint.pro
productName: ChequePrint Pro
directories:
  output: build
  buildResources: assets
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target: nsis
  icon: public/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  category: public.app-category.business
linux:
  target: AppImage
